<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dopasuj definicję — Jstn Angielski</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1a73e8;
      color: #fff;
      padding: 1.5rem;
      position: relative;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }
    .back-link {
      position: absolute;
      left: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 0.7; }
    header h1 { font-size: 1.8rem; letter-spacing: 1px; }
    header p  { margin-top: 0.25rem; font-size: 1rem; opacity: 0.85; }

    /* ── Main layout ── */
    main {
      flex: 1;
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      width: 100%;
    }
    .game-header {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .game-header h2 {
      font-size: 1.8rem;
      color: #1a73e8;
      margin-bottom: 0.4rem;
    }
    .game-header p { color: #555; font-size: 1rem; }

    /* ── Panel card ── */
    .panel {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    /* ── Match game area ── */
    .match-area {
      position: relative;
      display: flex;
      gap: 0;
      align-items: flex-start;
      user-select: none;
    }

    .match-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Columns push content inward to leave room for lines in the middle */
    .words-column { padding-right: 70px; }
    .defs-column  { padding-left: 70px; }

    /* SVG overlay drawn on top of the whole match-area */
    .lines-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    /* ── Individual word / definition items ── */
    .match-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 1rem;
      border: 2px solid #dadce0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.12s, box-shadow 0.12s;
      min-height: 52px;
      width: 100%;
    }
    .match-item:hover {
      border-color: #1a73e8;
      background: #e8f0fe;
      box-shadow: 0 2px 6px rgba(26, 115, 232, 0.18);
    }
    .match-item.selected {
      border-color: #1a73e8;
      background: #e8f0fe;
      transform: scale(1.02);
      box-shadow: 0 2px 8px rgba(26, 115, 232, 0.25);
    }
    .match-item.connected {
      border-color: #5f6368;
      background: #f8f9fa;
    }
    .match-item.correct {
      border-color: #188038;
      background: #e6f4ea;
    }
    .match-item.wrong {
      border-color: #c5221f;
      background: #fce8e6;
    }

    .item-label {
      font-weight: 700;
      color: #5f6368;
      min-width: 1.6rem;
      font-size: 0.88rem;
      flex-shrink: 0;
    }
    .item-text {
      font-size: 0.95rem;
      line-height: 1.4;
    }

    /* Small anchor dot shown on the connecting edge of each item */
    .anchor-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid #adb5bd;
      background: #fff;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .words-column .match-item { flex-direction: row; }
    .words-column .anchor-dot { margin-left: auto; }

    .defs-column .match-item { flex-direction: row-reverse; }
    .defs-column .anchor-dot { margin-right: auto; }
    .defs-column .item-label { text-align: right; }

    .match-item.selected   .anchor-dot { background: #1a73e8; border-color: #1a73e8; }
    .match-item.connected  .anchor-dot { background: #5f6368; border-color: #5f6368; }
    .match-item.correct    .anchor-dot { background: #188038; border-color: #188038; }
    .match-item.wrong      .anchor-dot { background: #c5221f; border-color: #c5221f; }

    /* ── Controls ── */
    .controls {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    .btn:active { transform: translateY(0); }
    .btn-primary   { background: #1a73e8; color: #fff; }
    .btn-secondary { background: #34a853; color: #fff; }
    .btn-outline   { background: #fff; color: #555; border: 2px solid #ddd; }

    /* ── Feedback ── */
    .feedback {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      min-height: 2rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
    }
    .feedback-success { color: #188038; background: #e6f4ea; }
    .feedback-partial { color: #b06000; background: #fef7e0; }
    .feedback-wrong   { color: #c5221f; background: #fce8e6; }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .words-column { padding-right: 40px; }
      .defs-column  { padding-left: 40px; }
      .match-item   { font-size: 0.85rem; padding: 0.5rem 0.75rem; min-height: 44px; }
      .back-link    { font-size: 0.8rem; }
    }
    @media (max-width: 480px) {
      .words-column { padding-right: 24px; }
      .defs-column  { padding-left: 24px; }
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>

<header>
  <a href="../index.html" class="back-link">← Strona główna</a>
  <div class="header-inner">
    <h1>📚 Jstn Angielski</h1>
    <p>Nauka angielskiego — krok po kroku</p>
  </div>
</header>

<main>
  <div class="game-header">
    <h2 id="game-title">🔗 Dopasuj definicję</h2>
    <p>Kliknij słowo, a następnie pasującą definicję, aby je połączyć. Kliknij ponownie, aby usunąć połączenie.</p>
  </div>

  <div class="panel">
    <div class="match-area" id="match-area">
      <div class="match-column words-column" id="words-col"></div>
      <svg class="lines-svg" id="lines-svg" aria-hidden="true"></svg>
      <div class="match-column defs-column"  id="defs-col"></div>
    </div>

    <div class="controls">
      <button class="btn btn-primary"   onclick="checkAnswers()">✔ Sprawdź</button>
      <button class="btn btn-secondary" onclick="revealAnswers()">👁 Pokaż odpowiedzi</button>
      <button class="btn btn-outline"   onclick="resetGame()">↺ Resetuj</button>
    </div>

    <div class="feedback" id="feedback"></div>
  </div>
</main>

<footer>
  <p>&copy; 2026 Jstn Angielski</p>
</footer>

<script>
/* ════════════════════════════════════════════════════════════════
   CONFIGURATION
   Edit this object to create a different puzzle.
   Add or remove items from `pairs` to change n.
   ════════════════════════════════════════════════════════════════ */
const MATCH_CONFIG = {
  title: "Połącz wyrazy z właściwymi definicjami",
  pairs: [
    { word: "birth",          definition: "when someone is born" },
    { word: "dream",          definition: "this happens when you are sleeping" },
    { word: "cartoon",        definition: "a film made of pictures" },
    { word: "character",      definition: "a person or animal in a film" },
    { word: "studio",         definition: "a place where people make films" },
    { word: "earn",           definition: "get money by working" },
    { word: "amusement park", definition: "a place where you can ride on special machines for fun" },
    { word: "record",         definition: "being the best in the world" },
  ],
};

/* ════════════════════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════════════════════ */
let shuffledDefs = [];   // [{id, text}, …] – definitions in shuffled order
let selectedWord = null; // wordId (index into MATCH_CONFIG.pairs) or null
let selectedDef  = null; // defIdx (position in shuffledDefs) or null
let connections  = {};   // wordId → defIdx
let gameRevealed = false;

/* ════════════════════════════════════════════════════════════════
   INITIALISATION
   ════════════════════════════════════════════════════════════════ */
function init() {
  document.getElementById("game-title").textContent =
    "🔗 " + MATCH_CONFIG.title;

  shuffledDefs = MATCH_CONFIG.pairs
    .map((p, i) => ({ id: i, text: p.definition }))
    .sort(() => Math.random() - 0.5);

  selectedWord = null;
  selectedDef  = null;
  connections  = {};
  gameRevealed = false;

  buildDOM();
  clearFeedback();
}

/* ════════════════════════════════════════════════════════════════
   DOM RENDERING
   ════════════════════════════════════════════════════════════════ */
function buildDOM() {
  const wordsCol = document.getElementById("words-col");
  const defsCol  = document.getElementById("defs-col");
  wordsCol.innerHTML = "";
  defsCol.innerHTML  = "";

  const letters = "abcdefghijklmnopqrstuvwxyz";

  MATCH_CONFIG.pairs.forEach((pair, wordId) => {
    const el = document.createElement("div");
    el.className = "match-item";
    el.dataset.wordId = wordId;
    el.innerHTML =
      `<span class="item-label">${wordId + 1}.</span>` +
      `<span class="item-text">${pair.word}</span>` +
      `<span class="anchor-dot"></span>`;
    el.addEventListener("click", () => onWordClick(wordId));
    wordsCol.appendChild(el);
  });

  shuffledDefs.forEach((def, defIdx) => {
    const el = document.createElement("div");
    el.className = "match-item";
    el.dataset.defIdx = defIdx;
    el.dataset.defId  = def.id;
    el.innerHTML =
      `<span class="anchor-dot"></span>` +
      `<span class="item-label">${letters[defIdx]}.</span>` +
      `<span class="item-text">${def.text}</span>`;
    el.addEventListener("click", () => onDefClick(defIdx));
    defsCol.appendChild(el);
  });

  drawLines();
}

/* ════════════════════════════════════════════════════════════════
   CLICK HANDLERS
   ════════════════════════════════════════════════════════════════ */
function onWordClick(wordId) {
  if (gameRevealed) return;

  if (selectedWord === wordId) {
    // Tap same word again → deselect
    selectedWord = null;
  } else if (selectedDef !== null) {
    // A definition is already waiting → complete the connection
    makeConnection(wordId, selectedDef);
    selectedWord = null;
    selectedDef  = null;
  } else {
    selectedWord = wordId;
    selectedDef  = null;
  }
  updateHighlights();
}

function onDefClick(defIdx) {
  if (gameRevealed) return;

  if (selectedDef === defIdx) {
    // Tap same definition again → deselect
    selectedDef = null;
  } else if (selectedWord !== null) {
    // A word is already waiting → complete the connection
    makeConnection(selectedWord, defIdx);
    selectedWord = null;
    selectedDef  = null;
  } else {
    selectedDef  = defIdx;
    selectedWord = null;
  }
  updateHighlights();
}

/* ════════════════════════════════════════════════════════════════
   CONNECTION LOGIC
   ════════════════════════════════════════════════════════════════ */
function makeConnection(wordId, defIdx) {
  // If already the exact same connection → toggle off
  if (connections[wordId] === defIdx) {
    delete connections[wordId];
    clearFeedback();
    updateHighlights();
    drawLines();
    return;
  }

  // Remove any existing connection for this word
  delete connections[wordId];

  // Remove any existing connection that already uses this definition slot
  Object.keys(connections).forEach((wId) => {
    if (connections[wId] === defIdx) delete connections[wId];
  });

  connections[wordId] = defIdx;
  clearFeedback();
  updateHighlights();
  drawLines();
}

/* ════════════════════════════════════════════════════════════════
   HIGHLIGHT CLASSES
   ════════════════════════════════════════════════════════════════ */
function updateHighlights() {
  const connectedDefIdxs = new Set(Object.values(connections));

  document.querySelectorAll("#words-col .match-item").forEach((el) => {
    const wid = +el.dataset.wordId;
    el.classList.remove("selected", "connected", "correct", "wrong");
    if (selectedWord === wid)           el.classList.add("selected");
    else if (wid in connections)        el.classList.add("connected");
  });

  document.querySelectorAll("#defs-col .match-item").forEach((el) => {
    const idx = +el.dataset.defIdx;
    el.classList.remove("selected", "connected", "correct", "wrong");
    if (selectedDef === idx)                 el.classList.add("selected");
    else if (connectedDefIdxs.has(idx))      el.classList.add("connected");
  });
}

/* ════════════════════════════════════════════════════════════════
   SVG LINE DRAWING
   ════════════════════════════════════════════════════════════════ */
function anchorPoint(el, side) {
  const area  = document.getElementById("match-area");
  const base  = area.getBoundingClientRect();
  const rect  = el.getBoundingClientRect();
  // Use the anchor-dot element for a precise attach point
  const dot   = el.querySelector(".anchor-dot");
  const dRect = dot ? dot.getBoundingClientRect() : rect;
  const y     = dRect.top  - base.top  + dRect.height / 2;
  const x     = side === "right"
    ? dRect.right - base.left
    : dRect.left  - base.left;
  return { x, y };
}

function drawLines(colorFn) {
  const svg = document.getElementById("lines-svg");
  svg.innerHTML = "";
  const ns = "http://www.w3.org/2000/svg";

  Object.entries(connections).forEach(([wordIdStr, defIdx]) => {
    const wordId = +wordIdStr;
    defIdx = +defIdx;

    const wordEl = document.querySelector(`#words-col [data-word-id="${wordId}"]`);
    const defEl  = document.querySelector(`#defs-col [data-def-idx="${defIdx}"]`);
    if (!wordEl || !defEl) return;

    const start = anchorPoint(wordEl, "right");
    const end   = anchorPoint(defEl,  "left");
    const cx    = (start.x + end.x) / 2;

    const color = colorFn ? colorFn(wordId, defIdx) : "#1a73e8";

    const path = document.createElementNS(ns, "path");
    path.setAttribute(
      "d",
      `M ${start.x} ${start.y} C ${cx} ${start.y}, ${cx} ${end.y}, ${end.x} ${end.y}`
    );
    path.setAttribute("stroke", color);
    path.setAttribute("stroke-width", "2.5");
    path.setAttribute("fill", "none");
    path.setAttribute("stroke-linecap", "round");
    svg.appendChild(path);
  });
}

/* ════════════════════════════════════════════════════════════════
   CHECK ANSWERS
   ════════════════════════════════════════════════════════════════ */
function checkAnswers() {
  const n = MATCH_CONFIG.pairs.length;
  let correct = 0;

  // Clear old state classes
  document.querySelectorAll(".match-item").forEach((el) => {
    el.classList.remove("selected", "connected", "correct", "wrong");
  });

  MATCH_CONFIG.pairs.forEach((_, wordId) => {
    const wordEl = document.querySelector(`#words-col [data-word-id="${wordId}"]`);
    if (!(wordId in connections)) return;

    const defIdx  = connections[wordId];
    const defEl   = document.querySelector(`#defs-col [data-def-idx="${defIdx}"]`);
    const matched = shuffledDefs[defIdx].id === wordId;

    if (matched) {
      correct++;
      wordEl.classList.add("correct");
      if (defEl) defEl.classList.add("correct");
    } else {
      wordEl.classList.add("wrong");
      if (defEl) defEl.classList.add("wrong");
    }
  });

  // Items without any connection stay neutral
  document.querySelectorAll(".match-item").forEach((el) => {
    if (
      !el.classList.contains("correct") &&
      !el.classList.contains("wrong")
    ) {
      el.classList.add("connected"); // neutral / unmatched styling
    }
  });

  drawLines((wordId, defIdx) =>
    shuffledDefs[defIdx].id === wordId ? "#188038" : "#c5221f"
  );

  const fb = document.getElementById("feedback");
  if (correct === n) {
    fb.className = "feedback feedback-success";
    fb.textContent = `✅ Brawo! Wszystkie ${n} odpowiedzi poprawne!`;
  } else if (correct > 0) {
    fb.className = "feedback feedback-partial";
    fb.textContent = `⚠️ ${correct} z ${n} poprawnych. Spróbuj jeszcze raz!`;
  } else {
    fb.className = "feedback feedback-wrong";
    fb.textContent = `❌ Żadna odpowiedź nie jest poprawna. Spróbuj jeszcze raz!`;
  }
}

/* ════════════════════════════════════════════════════════════════
   REVEAL ANSWERS
   ════════════════════════════════════════════════════════════════ */
function revealAnswers() {
  gameRevealed = true;
  selectedWord = null;
  selectedDef  = null;

  // Build the perfect mapping
  connections = {};
  MATCH_CONFIG.pairs.forEach((_, wordId) => {
    const defIdx = shuffledDefs.findIndex((d) => d.id === wordId);
    connections[wordId] = defIdx;
  });

  document.querySelectorAll(".match-item").forEach((el) => {
    el.classList.remove("selected", "connected", "wrong");
    el.classList.add("correct");
  });

  drawLines(() => "#188038");

  const fb = document.getElementById("feedback");
  fb.className = "feedback feedback-partial";
  fb.textContent = "Pokazano poprawne odpowiedzi.";
}

/* ════════════════════════════════════════════════════════════════
   RESET
   ════════════════════════════════════════════════════════════════ */
function resetGame() {
  init();
}

function clearFeedback() {
  const fb = document.getElementById("feedback");
  fb.className = "feedback";
  fb.textContent = "";
  document.querySelectorAll(".match-item").forEach((el) => {
    el.classList.remove("correct", "wrong");
  });
}

/* ════════════════════════════════════════════════════════════════
   REDRAW LINES ON RESIZE
   ════════════════════════════════════════════════════════════════ */
window.addEventListener("resize", () => drawLines());

/* ════════════════════════════════════════════════════════════════
   BOOT
   ════════════════════════════════════════════════════════════════ */
init();
</script>

</body>
</html>
