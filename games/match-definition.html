<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match the Definition — Justyna's Presentation Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8 url('../background_image.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #a0c6d4;
      color: #fff;
      padding: 1.5rem;
      position: relative;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }
    header h1 { font-size: 1.8rem; letter-spacing: 1px; }
    header h1 a { color: inherit; text-decoration: none; }
    header h1 a:hover { opacity: 0.85; }
    header p  { margin-top: 0.25rem; font-size: 1rem; opacity: 0.85; }

    /* ── Main layout ── */
    main {
      flex: 1;
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      width: 100%;
    }
    .game-header {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .game-header h2 {
      font-size: 1.8rem;
      color: #1a73e8;
      margin-bottom: 0.4rem;
    }
    .game-header p { color: #555; font-size: 1rem; }

    /* ── Panel card ── */
    .panel {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    /* ── Match game area ── */
    .match-area {
      position: relative;
      display: flex;
      gap: 0;
      align-items: flex-start;
      user-select: none;
    }

    .match-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Columns push content inward to leave room for lines in the middle */
    .words-column { padding-right: 70px; }
    .defs-column  { padding-left: 70px; }

    /* SVG overlay drawn on top of the whole match-area */
    .lines-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    /* ── Individual word / definition items ── */
    .match-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 1rem;
      border: 2px solid #dadce0;
      border-radius: 8px;
      background: #fff;
      cursor: grab;
      transition: border-color 0.15s, background 0.15s, transform 0.12s, box-shadow 0.12s;
      min-height: 52px;
      width: 100%;
    }
    .match-item:hover {
      border-color: #1a73e8;
      background: #e8f0fe;
      box-shadow: 0 2px 6px rgba(26, 115, 232, 0.18);
    }
    .match-item.selected {
      border-color: #1a73e8;
      background: #e8f0fe;
      transform: scale(1.02);
      box-shadow: 0 2px 8px rgba(26, 115, 232, 0.25);
      cursor: grabbing;
    }
    .match-item.connected {
      border-color: #5f6368;
      background: #f8f9fa;
    }
    .match-item.correct {
      border-color: #188038;
      background: #e6f4ea;
    }
    .match-item.wrong {
      border-color: #c5221f;
      background: #fce8e6;
    }

    .item-label {
      font-weight: 700;
      color: #5f6368;
      min-width: 1.6rem;
      font-size: 0.88rem;
      flex-shrink: 0;
    }
    .item-text {
      font-size: 0.95rem;
      line-height: 1.4;
    }

    /* Small anchor dot shown on the connecting edge of each item */
    .anchor-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid #adb5bd;
      background: #fff;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .words-column .match-item { flex-direction: row; }
    .words-column .anchor-dot { margin-left: auto; }

    /* Anchor dot stays as first child (left / connecting edge) in defs column */
    .defs-column .match-item { flex-direction: row; }

    .match-item.drop-target {
      border-color: #fbbc04;
      background: #fef7e0;
      box-shadow: 0 2px 8px rgba(251, 188, 4, 0.4);
    }
    .match-item.drop-target .anchor-dot { background: #fbbc04; border-color: #fbbc04; }

    .match-item.selected   .anchor-dot { background: #1a73e8; border-color: #1a73e8; }
    .match-item.connected  .anchor-dot { background: #5f6368; border-color: #5f6368; }
    .match-item.correct    .anchor-dot { background: #188038; border-color: #188038; }
    .match-item.wrong      .anchor-dot { background: #c5221f; border-color: #c5221f; }

    /* ── Controls ── */
    .controls {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    .btn:active { transform: translateY(0); }
    .btn-primary   { background: #a0c6d4; color: #fff; }
    .btn-secondary { background: #34a853; color: #fff; }
    .btn-outline   { background: #fff; color: #555; border: 2px solid #ddd; }

    /* ── Feedback ── */
    .feedback {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      min-height: 2rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
    }
    .feedback-success { color: #188038; background: #e6f4ea; }
    .feedback-partial { color: #b06000; background: #fef7e0; }
    .feedback-wrong   { color: #c5221f; background: #fce8e6; }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .words-column { padding-right: 40px; }
      .defs-column  { padding-left: 40px; }
      .match-item   { font-size: 0.85rem; padding: 0.5rem 0.75rem; min-height: 44px; }
    }
    @media (max-width: 480px) {
      .words-column { padding-right: 24px; }
      .defs-column  { padding-left: 24px; }
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1><a href="../index.html">📚 Justyna's Presentation Quiz</a></h1>
  </div>
</header>

<main>
  <div class="game-header">
    <h2 id="game-title">🔗 Match the Definition</h2>
    <p>Drag a word to its matching definition to connect them. Click a connected word to remove a connection.</p>
  </div>

  <div class="panel">
    <div class="match-area" id="match-area">
      <div class="match-column words-column" id="words-col"></div>
      <svg class="lines-svg" id="lines-svg" aria-hidden="true"></svg>
      <div class="match-column defs-column"  id="defs-col"></div>
    </div>

    <div class="controls">
      <button class="btn btn-outline"   onclick="resetGame()">↺ Reset</button>
    </div>

    <div class="feedback" id="feedback"></div>
  </div>
</main>

<footer>
  <p>&copy; 2026 Jstn Angielski</p>
</footer>

<script>
/* ════════════════════════════════════════════════════════════════
   CONFIGURATION
   Edit this object to create a different puzzle.
   Add or remove items from `pairs` to change n.
   ════════════════════════════════════════════════════════════════ */
const MATCH_CONFIG = {
  title: "Match the words with the correct definitions",
  pairs: [
    { word: "Chiaroscuro",           definition: "strong contrast between light and dark to model forms" },
    { word: "Tenebrism",             definition: "extreme use of darkness with sharp illumination on subjects" },
    { word: "Naturalism",            definition: "realistic depiction of people and objects" },
    { word: "Idealization",          definition: "representing figures in a perfected, flawless way" },
    { word: "Linear perspective",    definition: "technique to create depth using converging lines" },
    { word: "Foreshortening",        definition: "showing objects or bodies receding into space" },
    { word: "Composition",           definition: "arrangement of elements within a painting" },
    { word: "Triangular composition", definition: "organizing figures in a stable triangle shape" },
    { word: "Color palette",         definition: "the range of colors used in a work" },
    { word: "Anatomical proportion", definition: "correct or idealized structure of the human body" },
    { word: "Monochrome luminism",   definition: "the suggestive use of light in the context of a narrowed color range" },
  ],
};

/* ════════════════════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════════════════════ */
const DRAG_THRESHOLD = 5; // px – minimum movement to count as a drag

let shuffledDefs = [];   // [{id, text}, …] – definitions in shuffled order
let dragging    = null;  // { wordId, startX, startY, moved } or null
let connections  = {};   // wordId → defIdx
let gameRevealed = false;

/* ════════════════════════════════════════════════════════════════
   INITIALISATION
   ════════════════════════════════════════════════════════════════ */
function init() {
  document.getElementById("game-title").textContent =
    "🔗 " + MATCH_CONFIG.title;

  shuffledDefs = MATCH_CONFIG.pairs
    .map((p, i) => ({ id: i, text: p.definition }))
    .sort(() => Math.random() - 0.5);

  dragging     = null;
  connections  = {};
  gameRevealed = false;

  buildDOM();
  clearFeedback();
}

/* ════════════════════════════════════════════════════════════════
   DOM RENDERING
   ════════════════════════════════════════════════════════════════ */
function buildDOM() {
  const wordsCol = document.getElementById("words-col");
  const defsCol  = document.getElementById("defs-col");
  wordsCol.innerHTML = "";
  defsCol.innerHTML  = "";

  const letters = "abcdefghijklmnopqrstuvwxyz";

  MATCH_CONFIG.pairs.forEach((pair, wordId) => {
    const el = document.createElement("div");
    el.className = "match-item";
    el.dataset.wordId = wordId;
    el.innerHTML =
      `<span class="item-label">${wordId + 1}.</span>` +
      `<span class="item-text">${pair.word}</span>` +
      `<span class="anchor-dot"></span>`;
    el.addEventListener("mousedown", (e) => startDrag(wordId, e));
    el.addEventListener("touchstart", (e) => startDragTouch(wordId, e), { passive: false });
    wordsCol.appendChild(el);
  });

  shuffledDefs.forEach((def, defIdx) => {
    const el = document.createElement("div");
    el.className = "match-item";
    el.dataset.defIdx = defIdx;
    el.dataset.defId  = def.id;
    el.innerHTML =
      `<span class="anchor-dot"></span>` +
      `<span class="item-label">${letters[defIdx]}.</span>` +
      `<span class="item-text">${def.text}</span>`;
    defsCol.appendChild(el);
  });

  drawLines();
}

/* ════════════════════════════════════════════════════════════════
   DRAG-AND-DROP HANDLERS
   ════════════════════════════════════════════════════════════════ */
function hasCrossedThreshold(clientX, clientY) {
  const dx = clientX - dragging.startX;
  const dy = clientY - dragging.startY;
  return Math.sqrt(dx * dx + dy * dy) > DRAG_THRESHOLD;
}

function updateDragVisuals(clientX, clientY) {
  if (hasCrossedThreshold(clientX, clientY)) dragging.moved = true;
  if (!dragging.moved) return;

  const wordEl = document.querySelector(`#words-col [data-word-id="${dragging.wordId}"]`);
  const start  = anchorPoint(wordEl, "right");
  const area   = document.getElementById("match-area");
  const base   = area.getBoundingClientRect();
  drawDragLine(start, { x: clientX - base.left, y: clientY - base.top });

  clearDropTargets();
  const target = findDefElAtPoint(clientX, clientY);
  if (target) target.classList.add("drop-target");
}

function startDrag(wordId, e) {
  if (gameRevealed) return;
  e.preventDefault();
  dragging = { wordId, startX: e.clientX, startY: e.clientY, moved: false };
  updateHighlights();
  document.addEventListener("mousemove", onDragMove);
  document.addEventListener("mouseup",   onDragEnd);
}

function startDragTouch(wordId, e) {
  if (gameRevealed) return;
  e.preventDefault();
  const t = e.touches[0];
  dragging = { wordId, startX: t.clientX, startY: t.clientY, moved: false };
  updateHighlights();
  document.addEventListener("touchmove",   onDragMoveTouch,  { passive: false });
  document.addEventListener("touchend",    onDragEndTouch);
  document.addEventListener("touchcancel", onDragEndTouch);
}

function onDragMove(e) {
  if (!dragging) return;
  updateDragVisuals(e.clientX, e.clientY);
}

function onDragMoveTouch(e) {
  if (!dragging) return;
  e.preventDefault();
  const t = e.touches[0];
  updateDragVisuals(t.clientX, t.clientY);
}

function onDragEnd(e) {
  if (!dragging) return;
  document.removeEventListener("mousemove", onDragMove);
  document.removeEventListener("mouseup",   onDragEnd);

  clearDropTargets();
  removeDragLine();

  if (dragging.moved) {
    const target = findDefElAtPoint(e.clientX, e.clientY);
    if (target) makeConnection(dragging.wordId, +target.dataset.defIdx);
  } else {
    // Short click on a connected word → remove its connection
    if (dragging.wordId in connections) {
      delete connections[dragging.wordId];
      clearFeedback();
      drawLines();
    }
  }

  dragging = null;
  updateHighlights();
}

function onDragEndTouch(e) {
  if (!dragging) return;
  document.removeEventListener("touchmove",   onDragMoveTouch);
  document.removeEventListener("touchend",    onDragEndTouch);
  document.removeEventListener("touchcancel", onDragEndTouch);

  clearDropTargets();
  removeDragLine();

  if (dragging.moved && e.changedTouches.length) {
    const t      = e.changedTouches[0];
    const target = findDefElAtPoint(t.clientX, t.clientY);
    if (target) makeConnection(dragging.wordId, +target.dataset.defIdx);
  } else if (!dragging.moved) {
    if (dragging.wordId in connections) {
      delete connections[dragging.wordId];
      clearFeedback();
      drawLines();
    }
  }

  dragging = null;
  updateHighlights();
}

function findDefElAtPoint(clientX, clientY) {
  const el = document.elementFromPoint(clientX, clientY);
  return el ? el.closest("[data-def-idx]") : null;
}

function clearDropTargets() {
  document.querySelectorAll(".drop-target").forEach((el) =>
    el.classList.remove("drop-target")
  );
}

function drawDragLine(start, end) {
  const svg = document.getElementById("lines-svg");
  const ns  = "http://www.w3.org/2000/svg";
  let line  = document.getElementById("drag-line");
  if (!line) {
    line = document.createElementNS(ns, "path");
    line.id = "drag-line";
    line.setAttribute("stroke",           "#a0c6d4");
    line.setAttribute("stroke-width",     "2.5");
    line.setAttribute("fill",             "none");
    line.setAttribute("stroke-linecap",   "round");
    line.setAttribute("stroke-dasharray", "6 3");
    svg.appendChild(line);
  }
  const cx = (start.x + end.x) / 2;
  line.setAttribute(
    "d",
    `M ${start.x} ${start.y} C ${cx} ${start.y}, ${cx} ${end.y}, ${end.x} ${end.y}`
  );
}

function removeDragLine() {
  const line = document.getElementById("drag-line");
  if (line) line.remove();
}

/* ════════════════════════════════════════════════════════════════
   CONNECTION LOGIC
   ════════════════════════════════════════════════════════════════ */
function makeConnection(wordId, defIdx) {
  // If already the exact same connection → toggle off
  if (connections[wordId] === defIdx) {
    delete connections[wordId];
    clearFeedback();
    updateHighlights();
    drawLines();
    return;
  }

  // Remove any existing connection for this word
  delete connections[wordId];

  // Remove any existing connection that already uses this definition slot
  Object.keys(connections).forEach((wId) => {
    if (connections[wId] === defIdx) delete connections[wId];
  });

  connections[wordId] = defIdx;
  clearFeedback();
  updateHighlights();
  drawLines();
  checkAllCorrect();
}

/* ════════════════════════════════════════════════════════════════
   HIGHLIGHT CLASSES
   ════════════════════════════════════════════════════════════════ */
function updateHighlights() {
  const connectedDefIdxs = new Set(Object.values(connections));

  document.querySelectorAll("#words-col .match-item").forEach((el) => {
    const wid = +el.dataset.wordId;
    el.classList.remove("selected", "connected", "correct", "wrong");
    if (dragging && dragging.wordId === wid) el.classList.add("selected");
    else if (wid in connections)             el.classList.add("connected");
  });

  document.querySelectorAll("#defs-col .match-item").forEach((el) => {
    const idx = +el.dataset.defIdx;
    el.classList.remove("selected", "connected", "correct", "wrong");
    if (connectedDefIdxs.has(idx)) el.classList.add("connected");
  });
}

/* ════════════════════════════════════════════════════════════════
   SVG LINE DRAWING
   ════════════════════════════════════════════════════════════════ */
function anchorPoint(el, side) {
  const area  = document.getElementById("match-area");
  const base  = area.getBoundingClientRect();
  const rect  = el.getBoundingClientRect();
  // Use the anchor-dot element for a precise attach point
  const dot   = el.querySelector(".anchor-dot");
  const dRect = dot ? dot.getBoundingClientRect() : rect;
  const y     = dRect.top  - base.top  + dRect.height / 2;
  const x     = side === "right"
    ? dRect.right - base.left
    : dRect.left  - base.left;
  return { x, y };
}

function drawLines(colorFn = (wid, di) => shuffledDefs[di].id === wid ? "#188038" : "#c5221f") {
  const svg = document.getElementById("lines-svg");
  svg.innerHTML = "";
  const ns = "http://www.w3.org/2000/svg";

  Object.entries(connections).forEach(([wordIdStr, defIdx]) => {
    const wordId = +wordIdStr;
    defIdx = +defIdx;

    const wordEl = document.querySelector(`#words-col [data-word-id="${wordId}"]`);
    const defEl  = document.querySelector(`#defs-col [data-def-idx="${defIdx}"]`);
    if (!wordEl || !defEl) return;

    const start = anchorPoint(wordEl, "right");
    const end   = anchorPoint(defEl,  "left");
    const cx    = (start.x + end.x) / 2;

    const color = colorFn(wordId, defIdx);

    const path = document.createElementNS(ns, "path");
    path.setAttribute(
      "d",
      `M ${start.x} ${start.y} C ${cx} ${start.y}, ${cx} ${end.y}, ${end.x} ${end.y}`
    );
    path.setAttribute("stroke", color);
    path.setAttribute("stroke-width", "2.5");
    path.setAttribute("fill", "none");
    path.setAttribute("stroke-linecap", "round");
    svg.appendChild(path);
  });
}

/* ════════════════════════════════════════════════════════════════
   CHECK ANSWERS
   ════════════════════════════════════════════════════════════════ */
function checkAnswers() {
  const n = MATCH_CONFIG.pairs.length;
  let correct = 0;

  // Clear old state classes
  document.querySelectorAll(".match-item").forEach((el) => {
    el.classList.remove("selected", "connected", "correct", "wrong");
  });

  MATCH_CONFIG.pairs.forEach((_, wordId) => {
    const wordEl = document.querySelector(`#words-col [data-word-id="${wordId}"]`);
    if (!(wordId in connections)) return;

    const defIdx  = connections[wordId];
    const defEl   = document.querySelector(`#defs-col [data-def-idx="${defIdx}"]`);
    const matched = shuffledDefs[defIdx].id === wordId;

    if (matched) {
      correct++;
      wordEl.classList.add("correct");
      if (defEl) defEl.classList.add("correct");
    } else {
      wordEl.classList.add("wrong");
      if (defEl) defEl.classList.add("wrong");
    }
  });

  // Items without any connection stay neutral
  document.querySelectorAll(".match-item").forEach((el) => {
    if (
      !el.classList.contains("correct") &&
      !el.classList.contains("wrong")
    ) {
      el.classList.add("connected"); // neutral / unmatched styling
    }
  });

  drawLines();

  const fb = document.getElementById("feedback");
  if (correct === n) {
    fb.className = "feedback feedback-success";
    fb.textContent = `✅ Well done! All ${n} answers correct!`;
  } else if (correct > 0) {
    fb.className = "feedback feedback-partial";
    fb.textContent = `⚠️ ${correct} of ${n} correct. Try again!`;
  } else {
    fb.className = "feedback feedback-wrong";
    fb.textContent = `❌ No correct answers. Try again!`;
  }
}

/* ════════════════════════════════════════════════════════════════
   REVEAL ANSWERS
   ════════════════════════════════════════════════════════════════ */
function revealAnswers() {
  gameRevealed = true;
  dragging     = null;
  removeDragLine();
  clearDropTargets();

  // Build the perfect mapping
  connections = {};
  MATCH_CONFIG.pairs.forEach((_, wordId) => {
    const defIdx = shuffledDefs.findIndex((d) => d.id === wordId);
    connections[wordId] = defIdx;
  });

  document.querySelectorAll(".match-item").forEach((el) => {
    el.classList.remove("selected", "connected", "wrong");
    el.classList.add("correct");
  });

  drawLines(() => "#188038");

  const fb = document.getElementById("feedback");
  fb.className = "feedback feedback-partial";
  fb.textContent = "Correct answers revealed.";
}

/* ════════════════════════════════════════════════════════════════
   RESET
   ════════════════════════════════════════════════════════════════ */
function resetGame() {
  init();
}

function clearFeedback() {
  const fb = document.getElementById("feedback");
  fb.className = "feedback";
  fb.textContent = "";
  document.querySelectorAll(".match-item").forEach((el) => {
    el.classList.remove("correct", "wrong");
  });
}

/* ════════════════════════════════════════════════════════════════
   REDRAW LINES ON RESIZE
   ════════════════════════════════════════════════════════════════ */
window.addEventListener("resize", () => drawLines());

/* ════════════════════════════════════════════════════════════════
   AUTO-CHECK & FIREWORKS
   ════════════════════════════════════════════════════════════════ */
function checkAllCorrect() {
  const n = MATCH_CONFIG.pairs.length;
  if (Object.keys(connections).length < n) return;

  const allCorrect = Object.entries(connections)
    .every(([wid, di]) => shuffledDefs[+di].id === +wid);

  if (allCorrect) {
    document.querySelectorAll(".match-item").forEach((el) => {
      el.classList.remove("selected", "connected", "wrong");
      el.classList.add("correct");
    });
    drawLines(() => "#188038");
    const fb = document.getElementById("feedback");
    fb.className = "feedback feedback-success";
    fb.textContent = `✅ Well done! All ${n} answers correct!`;
    gameRevealed = true;
    launchFireworks();
  }
}

function launchFireworks() {
  const canvas = document.getElementById("fireworks-canvas");
  if (!canvas) return;
  canvas.style.display = "block";
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext("2d");

  const COLORS = ["#f44336","#e91e63","#9c27b0","#3f51b5","#2196f3",
                  "#00bcd4","#4caf50","#ffeb3b","#ff9800","#ff5722"];
  const particles = [];
  let launches = 0;
  const MAX_LAUNCHES = 8;

  function createExplosion(x, y) {
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    for (let i = 0; i < 70; i++) {
      const angle = (Math.PI * 2 * i) / 70 + Math.random() * 0.2;
      const speed = 2 + Math.random() * 6;
      particles.push({ x, y, vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed, alpha: 1, color,
        radius: 2 + Math.random() * 3 });
    }
  }

  function scheduleExplosion() {
    const x = canvas.width  * (0.15 + Math.random() * 0.7);
    const y = canvas.height * (0.1  + Math.random() * 0.45);
    createExplosion(x, y);
    launches++;
    if (launches < MAX_LAUNCHES) setTimeout(scheduleExplosion, 400 + Math.random() * 300);
  }
  scheduleExplosion();

  function onResize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener("resize", onResize);

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.09;
      p.alpha -= 0.014;
      if (p.alpha <= 0) { particles.splice(i, 1); continue; }
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle   = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    if (particles.length > 0 || launches < MAX_LAUNCHES) {
      requestAnimationFrame(animate);
    } else {
      canvas.style.display = "none";
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      window.removeEventListener("resize", onResize);
    }
  }
  animate();
}
