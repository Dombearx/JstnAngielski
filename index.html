<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jstn Angielski</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a73e8;
      color: #fff;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.5rem;
      letter-spacing: 1px;
    }

    main {
      flex: 1;
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      width: 100%;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 1.75rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
    }

    .card .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .card h2 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      color: #1a73e8;
    }

    .card p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #555;
    }

    .section-heading {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a73e8;
      margin-top: 2.5rem;
      margin-bottom: 0;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid #e8f0fe;
    }

    a.card {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>

  <header>
    <h1>📚 Jstn Angielski</h1>
  </header>

  <main>
    <h2 class="section-heading">🎮 Choose a Game</h2>
    <div class="card-grid">
      <a class="card" href="games/crossword.html">
        <div class="icon">🔤</div>
        <h2>Crossword</h2>
        <p>Guess the words from the clues and reveal the hidden word in the highlighted column.</p>
      </a>
      <a class="card" href="games/match-definition.html">
        <div class="icon">🔗</div>
        <h2>Match the Definition</h2>
        <p>Connect each word with its matching definition by clicking on pairs.</p>
      </a>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Jstn Angielski</p>
  </footer>

</body>
</html>
